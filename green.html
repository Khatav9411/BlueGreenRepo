<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Environment - Version 2</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #e6ffe6;
            text-align: center;
        }
        header {
            background-color: #28a745;
            color: white;
            padding: 20px;
        }
        .container {
            margin-top: 50px;
        }
        .box {
            display: inline-block;
            padding: 30px;
            border-radius: 10px;
            background-color: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #28a745;
        }
        .status {
            margin-top: 20px;
            font-size: 20px;
            color: green;
        }
        footer {
            margin-top: 50px;
            padding: 10px;
            background-color: #28a745;
            color: white;
        }
        .version {
            font-size: 18px;
            color: #333;
        }
    </style>
</head>
<body>

<header>
    <h1>GREEN Environment</h1>
    <p>Version 2 - Updated Application</p>
</header>

<div class="container">
    <div class="box">
        <h2>Welcome to Version 2 🚀</h2>
        <p>This is the GREEN environment.</p>
        <p class="version">New features deployed successfully!</p>
        
        <div class="status">
            Status: Running ✅
        </div>
    </div>
</div>

<footer>
    <p>Deployed using Blue-Green Deployment Strategy</p>
</footer>

</body>
</html>
