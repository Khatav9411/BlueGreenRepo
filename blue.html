<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Environment - Version 1</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #e6f0ff;
            text-align: center;
        }
        header {
            background-color: #007bff;
            color: white;
            padding: 20px;
        }
        .container {
            margin-top: 50px;
        }
        .box {
            display: inline-block;
            padding: 30px;
            border-radius: 10px;
            background-color: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #007bff;
        }
        .status {
            margin-top: 20px;
            font-size: 20px;
            color: green;
        }
        footer {
            margin-top: 50px;
            padding: 10px;
            background-color: #007bff;
            color: white;
        }
    </style>
</head>
<body>

<header>
    <h1>BLUE Environment</h1>
    <p>Version 1 - Live Application</p>
</header>

<div class="container">
    <div class="box">
        <h2>Welcome to Version 1</h2>
        <p>This is the BLUE environment.</p>
        <p>Your application is running successfully.</p>
        
        <div class="status">
            Status: Running ✅
        </div>
    </div>
</div>

<footer>
    <p>Deployed using Blue-Green Deployment Strategy</p>
</footer>

</body>
</html>
